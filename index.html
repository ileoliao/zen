<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Harbor Zen</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      touch-action: pan-y;
    }

    /* Elegant background layers */
    .bg-layer {
      position: fixed;
      top: -25%;
      left: -25%;
      width: 150%;
      height: 150%;
      z-index: 0;
      pointer-events: none;
    }

    /* Deep gradient base with richer layers */
    .bg-gradient {
      background:
        radial-gradient(ellipse at 20% 20%, rgba(232, 213, 183, 0.1) 0%, transparent 70%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 200, 236, 0.08) 0%, transparent 70%),
        radial-gradient(ellipse at 50% 50%, rgba(15, 15, 20, 1) 0%, rgba(8, 8, 12, 1) 100%);
      transition: all 2s ease;
    }

    .bg-gradient.begin {
      background:
        /* 朝阳主光芒 - 从左侧升起的金色阳光 */
        radial-gradient(ellipse at 20% 35%, rgba(255, 200, 100, 0.25) 0%, transparent 60%),
        /* 朝霞粉橙色过渡 */
        radial-gradient(ellipse at 45% 25%, rgba(255, 160, 120, 0.18) 0%, transparent 55%),
        /* 天空淡紫色 */
        radial-gradient(ellipse at 75% 30%, rgba(200, 160, 200, 0.12) 0%, transparent 65%),
        /* 底部深色地平线 */
        radial-gradient(ellipse at 50% 100%, rgba(40, 30, 35, 0.7) 0%, transparent 70%),
        /* 基础暗色背景 */
        radial-gradient(ellipse at 50% 50%, rgba(25, 20, 22, 1) 0%, rgba(12, 10, 10, 1) 100%);
    }

    .bg-gradient.deep {
      background:
        /* 深海主光源 - 深邃的蓝色光芒 */
        radial-gradient(ellipse at 35% 45%, rgba(80, 140, 200, 0.22) 0%, transparent 65%),
        /* 中层水域的幽蓝 */
        radial-gradient(ellipse at 65% 65%, rgba(60, 100, 160, 0.15) 0%, transparent 60%),
        /* 深层水波的微光 */
        radial-gradient(ellipse at 50% 80%, rgba(40, 80, 140, 0.1) 0%, transparent 70%),
        /* 深海暗处 */
        radial-gradient(ellipse at 50% 50%, rgba(10, 15, 25, 1) 0%, rgba(6, 10, 18, 1) 100%);
    }

    .bg-gradient.flow {
      background:
        /* 下午暖阳 - 琥珀色光芒 */
        radial-gradient(ellipse at 40% 40%, rgba(232, 184, 74, 0.2) 0%, transparent 60%),
        /* 蜂蜜色调过渡 */
        radial-gradient(ellipse at 60% 55%, rgba(200, 160, 80, 0.15) 0%, transparent 55%),
        /* 侧面的暖光 */
        radial-gradient(ellipse at 80% 30%, rgba(220, 170, 90, 0.1) 0%, transparent 65%),
        /* 温暖的工作氛围 */
        radial-gradient(ellipse at 50% 50%, rgba(28, 22, 18, 1) 0%, rgba(15, 12, 10, 1) 100%);
    }

    .bg-gradient.unwind {
      background:
        /* 日落余晖 - 深红/酒红色光芒 */
        radial-gradient(ellipse at 45% 50%, rgba(180, 100, 80, 0.22) 0%, transparent 60%),
        /* 黄昏的暖橙过渡 */
        radial-gradient(ellipse at 55% 60%, rgba(160, 90, 70, 0.15) 0%, transparent 55%),
        /* 上方的紫调 */
        radial-gradient(ellipse at 30% 25%, rgba(140, 100, 120, 0.12) 0%, transparent 65%),
        /* 夜晚降临的深色 */
        radial-gradient(ellipse at 50% 50%, rgba(22, 15, 18, 1) 0%, rgba(12, 10, 12, 1) 100%);
    }

    /* Subtle noise texture overlay - seamless */
    .bg-noise {
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      background-size: 512px 512px;
      background-repeat: repeat;
    }

    /* Slow flowing aurora effect */
    .bg-aurora {
      background:
        radial-gradient(circle at 30% 50%, rgba(255, 255, 255, 0.02) 0%, transparent 50%),
        radial-gradient(circle at 70% 50%, rgba(255, 255, 255, 0.015) 0%, transparent 50%);
      background-size: 150% 150%;
      animation: aurora 40s ease-in-out infinite;
    }

    @keyframes aurora {

      0%,
      100% {
        transform: translateX(0) scale(1);
        opacity: 1;
      }

      33% {
        transform: translateX(0.5%) scale(1.005);
        opacity: 0.8;
      }

      66% {
        transform: translateX(-0.5%) scale(0.995);
        opacity: 0.9;
      }
    }

    /* Vignette overlay for depth */
    .bg-vignette {
      background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .scene-indicator {
      position: absolute;
      top: 8vh;
      text-align: center;
      opacity: 0.9;
      transition: opacity 0.8s ease;
    }

    .scene-indicator.hidden {
      opacity: 0;
    }

    .scene-label {
      font-size: 11px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 8px;
    }

    .scene-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 0.15em;
      transition: color 0.6s ease;
    }

    .scene-name.begin {
      color: #f4c569;
    }

    .scene-name.deep {
      color: #7eb8e8;
    }

    .scene-name.flow {
      color: #e8b84a;
    }

    .scene-name.unwind {
      color: #c9846e;
    }

    .player-container {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .progress-ring {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg);
    }

    .progress-ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 1;
    }

    .progress-ring-fill {
      fill: none;
      stroke-width: 1;
      stroke-linecap: round;
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      transition: stroke-dashoffset 0.1s linear, stroke 0.6s ease;
    }

    .play-button {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-appearance: none;
      appearance: none;
      color: #fff;
      box-shadow: none;
      outline: none;
    }

    .play-button:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: scale(1.02);
    }

    .play-button:active {
      transform: scale(0.96);
    }

    /* Minimal state when playing */
    .play-button.playing {
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      background: transparent;
      border-color: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: none;
    }

    .play-button.playing:hover {
      background: transparent;
      transform: scale(1);
    }

    .play-button.loading {
      cursor: wait;
    }

    .play-button.loading .play-icon {
      opacity: 0.3;
      animation: pulse-loading 1s ease-in-out infinite;
    }

    @keyframes pulse-loading {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 0.7;
      }
    }

    .play-icon {
      width: 32px;
      height: 32px;
      fill: #fff;
      opacity: 0.9;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .play-button.playing .play-icon {
      opacity: 0.04;
      transform: scale(0.4);
    }

    .play-button.playing:hover .play-icon {
      opacity: 0.25;
      transform: scale(0.7);
    }

    .track-info {
      position: absolute;
      bottom: 8vh;
      text-align: center;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    .track-info.visible {
      opacity: 0.7;
    }

    .track-name {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .track-artist {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.1em;
    }

    .swipe-hint {
      position: absolute;
      bottom: 4vh;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.15);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .swipe-hint.visible {
      opacity: 1;
    }

    .volume-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .volume-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .volume-slider-vertical {
      width: 4px;
      height: 200px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }

    .volume-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 2px;
      transition: height 0.1s ease;
    }

    .volume-label {
      margin-top: 24px;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
    }

    /* Pomodoro Timer - "Time Ripple" Design */
    .timer-display {
      position: absolute;
      bottom: -56px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.25);
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace;
      opacity: 0.35;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
    }

    .timer-display:hover {
      opacity: 0.7;
      letter-spacing: 0.25em;
    }

    .timer-display.active {
      opacity: 0.6;
      animation: timer-breathe 5s ease-in-out infinite;
    }

    @keyframes timer-breathe {

      0%,
      100% {
        opacity: 0.5;
        transform: translateX(-50%) translateY(0);
      }

      50% {
        opacity: 0.75;
        transform: translateX(-50%) translateY(-2px);
      }
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .timer-display {
        bottom: -44px;
        font-size: 22px;
        letter-spacing: 0.18em;
      }
    }

    @media (max-height: 400px) {
      .timer-display {
        display: none;
      }
    }
  </style>
</head>

<body>
  <!-- Background layers -->
  <div class="bg-layer bg-gradient" id="bgGradient"></div>
  <div class="bg-layer bg-noise"></div>
  <div class="bg-layer bg-aurora"></div>
  <div class="bg-layer bg-vignette"></div>

  <div class="app" id="app">
    <div class="scene-indicator" id="sceneIndicator">
      <div class="scene-label">Current State</div>
      <div class="scene-name" id="sceneName">Deep Work</div>
    </div>

    <div class="player-container">
      <svg class="progress-ring" viewBox="0 0 140 140">
        <circle class="progress-ring-bg" cx="70" cy="70" r="70" />
        <circle class="progress-ring-fill" id="progressRing" cx="70" cy="70" r="70" />
      </svg>

      <button class="play-button" id="playBtn">
        <svg class="play-icon" id="playIcon" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z" />
        </svg>
        <svg class="play-icon" id="pauseIcon" viewBox="0 0 24 24" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
      </button>

      <span class="timer-display" id="timerDisplay">25:00</span>
    </div>

    <div class="track-info" id="trackInfo">
      <div class="track-name" id="trackName">Morning Light</div>
      <div class="track-artist" id="trackArtist">Piano Ambient</div>
    </div>

    <div class="swipe-hint" id="swipeHint">Swipe to change</div>

    <div class="volume-overlay" id="volumeOverlay">
      <div class="volume-slider-vertical" id="volumeSlider">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
      <div class="volume-label">Volume</div>
    </div>

    <!-- iOS Native Audio Fallback Player -->
    <audio id="iosAudioPlayer" playsinline preload="auto" style="display: none;"></audio>
  </div>

  <script>
    const scenes = [
      {
        id: 'begin',
        name: 'Begin',
        startHour: 8,
        endHour: 10,
        tracks: [
          { title: 'Morning Start', artist: 'Harbor Zen', file: 'Harbor Zen - Piano 1.mp3' }
        ]
      },
      {
        id: 'deep',
        name: 'Deep Work',
        startHour: 10,
        endHour: 13,
        tracks: [
          { title: 'Deep Piano', artist: 'Harbor Zen', file: 'Harbor Zen - Piano 2.mp3' },
          { title: 'Focus Guitar', artist: 'Harbor Zen', file: 'Harbor Zen - Guitar 1.mp3' },
          { title: 'Flow Guitar', artist: 'Harbor Zen', file: 'Harbor Zen - Guitar 2.mp3' }
        ]
      },
      {
        id: 'flow',
        name: 'Flow',
        startHour: 13,
        endHour: 17,
        tracks: [
          { title: 'Afternoon Piano', artist: 'Harbor Zen', file: 'Harbor Zen - Piano 3.mp3' }
        ]
      },
      {
        id: 'unwind',
        name: 'Unwind',
        startHour: 17,
        endHour: 19,
        tracks: [
          { title: 'Evening Close', artist: 'Harbor Zen', file: 'Harbor Zen - Piano4.mp3' }
        ]
      }
    ];

    let currentSceneIndex = 0;
    let currentTrackIndex = 0;
    let isPlaying = false;
    let currentHowl = null;
    let smoothedIntensity = 0;
    let smoothedScale = 1;
    let animationId = null;

    // Single audio source using Howler with Web Audio API
    let analyser = null;
    let dataArray = null;

    // Beat detection variables
    let bassHistory = [];
    const bassHistorySize = 12; // Longer history for better trend detection
    // Thresholds are now defined in the visualize function

    // Onset detection variables
    let previousEnergy = 0;
    let visualIntensity = 0; // Current visual intensity with decay
    const decayRate = 0.96; // Slower decay for more visible pulse
    const onsetThreshold = 0.002; // Much lower threshold for piano
    const onsetSensitivity = 8.0; // Higher sensitivity

    // Pomodoro Timer variables
    let pomodoroTimeRemaining = 25 * 60; // 25 minutes in seconds
    let pomodoroIsRunning = false;
    let pomodoroInterval = null;
    const pomodoroWorkDuration = 25 * 60;
    const pomodoroBreakDuration = 5 * 60;
    let pomodoroIsWorkSession = true;

    const sceneIndicator = document.getElementById('sceneIndicator');
    const sceneName = document.getElementById('sceneName');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const progressRing = document.getElementById('progressRing');
    const trackInfo = document.getElementById('trackInfo');
    const trackName = document.getElementById('trackName');
    const trackArtist = document.getElementById('trackArtist');
    const swipeHint = document.getElementById('swipeHint');
    const volumeOverlay = document.getElementById('volumeOverlay');
    const volumeFill = document.getElementById('volumeFill');
    const bgGradient = document.getElementById('bgGradient');

    let hideTimeout;
    let touchStartX = 0;
    let touchStartY = 0;
    let touchStartTime = 0;
    let longPressTimer;

    // Mobile detection for iOS
    // iOS Safari has extremely strict Web Audio API policies that often cause silent playback
    // To ensure reliable audio on iOS, we must use HTML5 Audio instead of Web Audio API
    const isIOS = [
      'iPad Simulator',
      'iPhone Simulator',
      'iPod Simulator',
      'iPad',
      'iPhone',
      'iPod'
    ].includes(navigator.platform)
    // Wire up events for the iOS native fallback
    if (isIOS) {
      iosAudioPlayer.addEventListener('ended', onTrackEnd);

      iosAudioPlayer.addEventListener('error', (e) => {
        console.error('iOS Audio Player Error:', iosAudioPlayer.error);
        // Recovery logic on error
        pausePlayback();
      });

      // Handle network buffering states
      iosAudioPlayer.addEventListener('waiting', () => {
        if (isPlaying) playBtn.classList.add('loading');
      });

      iosAudioPlayer.addEventListener('stalled', () => {
        if (isPlaying) playBtn.classList.add('loading');
      });

      iosAudioPlayer.addEventListener('playing', () => {
        playBtn.classList.remove('loading');
      });

      iosAudioPlayer.addEventListener('canplay', () => {
        if (isPlaying && iosAudioPlayer.paused) {
          iosAudioPlayer.play().catch(e => console.warn('iOS Auto-resume failed:', e));
        }
      });

      iosAudioPlayer.volume = 0.8;
    }

    // Preload all audio using Howler
    const preloadedSounds = {};
    let musicPreloaded = false;

    function preloadAllMusic() {
      if (musicPreloaded) return;
      musicPreloaded = true;

      const allFiles = [];

      // Prioritize current scene's tracks
      const currentScene = scenes[currentSceneIndex];
      if (currentScene) {
        currentScene.tracks.forEach(track => {
          if (!allFiles.includes(track.file)) {
            allFiles.push(track.file);
          }
        });
      }

      // Then queue the rest
      scenes.forEach((scene, index) => {
        if (index === currentSceneIndex) return; // Already loaded
        scene.tracks.forEach(track => {
          if (!allFiles.includes(track.file)) {
            allFiles.push(track.file);
          }
        });
      });

      // Start preloading in priority order
      // On desktop, we use Howler to preload via Web Audio API.
      // On iOS, we fetch the audio files directly into the browser's disk cache
      // because iOS Safari refuses to preload <audio> elements before user interaction.
      if (isIOS) {
        allFiles.forEach(file => {
          fetch(`music/${file}`, { mode: 'no-cors' }).catch(err => {
            console.warn(`Failed to pre-cache ${file} on iOS:`, err);
          });
        });
        return;
      }

      allFiles.forEach(file => {
        preloadedSounds[file] = new Howl({
          src: [`music/${file}`],
          html5: false, // Desktop uses Web Audio API
          preload: true,
          volume: 0.8,

          onloaderror: function (id, err) {
            console.error(`Failed to load ${file}:`, err);
          }
        });
      });
    }

    function getSceneByTime() {
      const hour = new Date().getHours();
      const index = scenes.findIndex(s => hour >= s.startHour && hour < s.endHour);
      return index !== -1 ? index : 3;
    }

    function loadScene(index) {
      currentSceneIndex = index;
      const scene = scenes[index];

      sceneName.textContent = scene.name;
      sceneName.className = 'scene-name ' + scene.id;
      playBtn.className = 'play-button ' + scene.id + (isPlaying ? ' playing' : '');
      progressRing.className = 'progress-ring-fill ' + scene.id;

      // Update timer color based on scene
      updatePomodoroDisplay();

      // Reset visual effects when not playing
      if (!isPlaying) {
        resetVisualEffects();
      }

      // Update background gradient based on scene - smooth transition
      if (bgGradient) {
        // Remove old scene classes
        bgGradient.classList.remove('begin', 'deep', 'flow', 'unwind');
        // Add new scene class
        bgGradient.classList.add(scene.id);
      }

      currentTrackIndex = 0;
      loadTrack();
    }

    function loadTrack() {
      const scene = scenes[currentSceneIndex];
      const track = scene.tracks[currentTrackIndex];

      trackName.textContent = track.title;
      trackArtist.textContent = track.artist;

      // Stop current playback without unloading (keep preloaded sounds)
      if (isIOS) {
        iosAudioPlayer.pause();
      } else if (currentHowl) {
        currentHowl.stop();
      }

      // Reset onset detection when switching tracks
      previousEnergy = 0;
      visualIntensity = 0;
      bassHistory = [];

      const file = track.file;

      if (isIOS) {
        // Point the unified native audio element to the new source
        iosAudioPlayer.src = `music/${file}`;
        iosAudioPlayer.load();
      } else {
        // Use preloaded Howl if available
        // Don't create new Howl here to avoid creating AudioContext before user gesture
        if (preloadedSounds[file]) {
          currentHowl = preloadedSounds[file];
        } else {
          // Will be created in ensureCurrentHowl() when playback starts
          currentHowl = null;
        }

        // Register onend callback so tracks auto-advance
        if (currentHowl) {
          currentHowl.off('end');
          currentHowl.on('end', onTrackEnd);
        }
      }
    }

    // Create Howl on demand (only called during user interaction)
    function ensureCurrentHowl() {
      if (isIOS || currentHowl) return;
      const scene = scenes[currentSceneIndex];
      const track = scene.tracks[currentTrackIndex];
      const file = track.file;

      if (preloadedSounds[file]) {
        currentHowl = preloadedSounds[file];
      } else {
        currentHowl = new Howl({
          src: [`music/${file}`],
          html5: false,
          volume: 0.8
        });
      }

      currentHowl.off('end');
      currentHowl.on('end', onTrackEnd);
    }

    let analyserConnected = false;

    function initAudioContext() {
      // If we are using HTML5 Audio (iOS), we cannot use AnalyserNode reliably
      // without CORS issues or MediaElementSource complications on Safari.
      // So we skip it entirely.
      if (isIOS) return;

      // Force create Howler's AudioContext if it doesn't exist yet
      if (!Howler.ctx) {
        Howler.volume(0.8);
      }

      if (!analyser && Howler.ctx) {
        analyser = Howler.ctx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.92;
        analyser.minDecibels = -90;
        analyser.maxDecibels = -10;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }

      // Connect analyser as a BRANCH (don't disconnect masterGain!)
      // Existing: Howler.masterGain → ctx.destination (keep for audio output)
      // Added:   Howler.masterGain → analyser (for visualization data only)
      // This way audio always reaches speakers even if analyser fails
      if (analyser && Howler.masterGain && !analyserConnected) {
        try {
          Howler.masterGain.connect(analyser);
          analyserConnected = true;
        } catch (e) {
          console.warn('Failed to connect analyser:', e);
        }
      }
    }

    function onTrackEnd() {
      currentTrackIndex = (currentTrackIndex + 1) % scenes[currentSceneIndex].tracks.length;
      loadTrack();
      if (isPlaying) {
        startPlayback();
      }
    }

    function togglePlay() {
      if (playBtn.classList.contains('loading')) return;

      // Toggle Pomodoro Timer (music follows automatically)
      togglePomodoro();

      resetHideTimer();
    }

    function startPlayback() {
      playBtn.classList.add('loading');

      // 1. Desktop: Web Audio Context Resurrection
      if (!isIOS) {
        if (!Howler.ctx) {
          Howler.volume(0.8);
        }
        if (Howler.ctx && Howler.ctx.state === 'suspended') {
          Howler.ctx.resume().catch(e => console.warn('Failed to resume AudioContext:', e));
        }
      }

      // Ensure music is preloaded (first interaction)
      preloadAllMusic();

      if (!isIOS && !currentHowl) {
        ensureCurrentHowl();
      }

      // Initialize audio context for analysis (bypasses on iOS)
      initAudioContext();

      // Check if already loaded
      if (isIOS) {
        // Native audio is ready enough when network state is not EMPTY
        if (iosAudioPlayer.readyState >= 2) {
          playAudioAndStart();
        } else {
          // If we just set src, play() will automatically wait for enough data
          playAudioAndStart();
        }
      } else {
        if (currentHowl.state() === 'loaded') {
          playAudioAndStart();
        } else if (currentHowl.state() === 'loading') {
          // Wait for load
          currentHowl.once('load', () => {
            playAudioAndStart();
          });
        } else {
          // State is 'unloaded', need to load first
          currentHowl.load();
          currentHowl.once('load', () => {
            playAudioAndStart();
          });
        }
      }
    }

    function playAudioAndStart() {
      if (isIOS) {
        // Bypass Howler completely, directly manipulate native element
        playBtn.classList.add('loading'); // Show loading until it actually starts
        iosAudioPlayer.play().then(() => {
          onPlaybackStart();
        }).catch(err => {
          // Play request interrupted by network/buffer wait is fine, 
          // our 'playing' and 'canplay' listeners will catch it when it continues
          console.warn('iOS Native Play Interrupted/Wait:', err);
          // Don't remove loading spinner here, let the event listeners handle it
        });
      } else {
        // Desktop Web Audio Logic
        if (Howler.ctx && Howler.ctx.state === 'suspended') {
          Howler.ctx.resume().catch(e => console.warn('Failed to resume AudioContext:', e));
        }
        currentHowl.play();
        onPlaybackStart();
      }
    }

    function onPlaybackStart() {
      isPlaying = true;
      playBtn.classList.remove('loading');
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'block';
      playBtn.classList.add('playing');
      showTrackInfo();
    }

    function pausePlayback() {
      isPlaying = false;
      if (isIOS) {
        iosAudioPlayer.pause();
      } else if (currentHowl) {
        currentHowl.pause();
      }
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
      playBtn.classList.remove('playing');
      resetVisualEffects();
    }

    // Start visualization loop for Pomodoro progress
    function startVisualizationLoop() {
      if (animationId) cancelAnimationFrame(animationId);
      visualizeLoop();
    }

    function visualizeLoop() {
      visualize();
      animationId = requestAnimationFrame(visualizeLoop);
    }

    function stopVisualizationLoop() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }

    function resetVisualEffects() {
      playBtn.style.transform = '';
      playBtn.style.boxShadow = '';
      playBtn.style.borderColor = '';
      playBtn.style.opacity = '';
      progressRing.style.stroke = '';
      progressRing.style.filter = '';
      smoothedIntensity = 0;
      smoothedScale = 1;
      bassHistory = [];
      previousEnergy = 0;
      visualIntensity = 0;
    }

    function play() {
      isPlaying = true;
      startPlayback();
    }

    function nextScene() {
      loadScene((currentSceneIndex + 1) % scenes.length);
      play();
      showUI();
    }

    function prevScene() {
      loadScene((currentSceneIndex - 1 + scenes.length) % scenes.length);
      play();
      showUI();
    }

    function showTrackInfo() {
      trackInfo.classList.add('visible');
      resetHideTimer();
    }

    function showUI() {
      sceneIndicator.classList.remove('hidden');
      trackInfo.classList.add('visible');
      swipeHint.classList.add('visible');
      resetHideTimer();
    }

    function hideUI() {
      sceneIndicator.classList.add('hidden');
      trackInfo.classList.remove('visible');
      swipeHint.classList.remove('visible');
    }

    function resetHideTimer() {
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(hideUI, 4000);
    }

    function updateProgress() {
      // Show Pomodoro progress instead of music progress
      // Ring fills up as time passes (empty → full)
      const circumference = 440;
      if (!pomodoroIsRunning) {
        // Show empty ring when not running
        progressRing.style.strokeDashoffset = circumference;
        return;
      }
      const totalDuration = pomodoroIsWorkSession ? pomodoroWorkDuration : pomodoroBreakDuration;
      const elapsed = totalDuration - pomodoroTimeRemaining;
      const progress = elapsed / totalDuration;
      const offset = circumference - (progress * circumference);
      progressRing.style.strokeDashoffset = offset;
    }

    // Audio-driven visualization
    let frameCount = 0;
    function visualize() {
      frameCount++;

      // Update progress ring (always update for Pomodoro)
      updateProgress();

      // Only do audio visualization when music is playing
      let audioIntensity = 0;

      // Only do audio visualization when music is actually playing
      const isActuallyPlaying = isIOS ? (!iosAudioPlayer.paused) : (currentHowl && currentHowl.playing());

      if (isActuallyPlaying && !isIOS) {
        // Get audio frequency data if available
        if (analyser && dataArray) {
          analyser.getByteFrequencyData(dataArray);

          // Capture low frequencies: bass + low-mids for piano and kick drum
          // fftSize 256 = 128 bins. With 44.1kHz sample rate:
          // bin 0-7 (~0-1300Hz): captures bass notes, low piano chords, kick drum
          const lowBinCount = Math.min(8, dataArray.length);
          let lowSum = 0;

          for (let i = 0; i < lowBinCount; i++) {
            lowSum += dataArray[i];
          }

          // Calculate current frame energy (normalized 0-1)
          const currentEnergy = lowSum / lowBinCount / 255;

          // ONSET DETECTION: Detect sudden energy increase (attack/beat)
          const energyDelta = currentEnergy - previousEnergy;
          let onsetStrength = 0;

          if (energyDelta > onsetThreshold) {
            // Onset detected! Calculate strength based on how sharp the increase is
            onsetStrength = Math.min(1, energyDelta * onsetSensitivity);
          }

          // Update visual intensity:
          // 1. If there's an onset, add it to current intensity (stacking for strong beats)
          // 2. Always apply decay to create fade-out effect
          if (onsetStrength > 0) {
            // Add new onset to existing intensity (cap at 1.0)
            visualIntensity = Math.min(1.0, visualIntensity + onsetStrength * 0.8);
          }

          // Apply decay every frame
          visualIntensity *= decayRate;

          // Minimum breathing level so it's never completely flat
          visualIntensity = Math.max(0.12, visualIntensity);

          // Store current energy for next frame
          previousEnergy = currentEnergy;

          // Use visualIntensity directly (no additional smoothing needed due to decay)
          audioIntensity = visualIntensity;
        }
      } else if (isActuallyPlaying && isIOS) {
        // Fallback breathing animation for iOS (HTML5 Audio mode lacks AnalyserNode)
        // Use a time-based sine wave to create a smooth, noticeable rhythmic pulse
        const time = Date.now() / 1000;

        // Base intensity + sine wave oscillation
        // Oscillation range: -1 to 1. We scale it and add to a base value.
        // Base 0.3, Swing 0.15 = pulsates between 0.15 and 0.45
        const breatheSpeed = 4.0; // Seconds per full breath cycle
        const pulse = Math.sin(time * Math.PI * 2 / breatheSpeed);

        visualIntensity = 0.3 + (pulse * 0.15);
        previousEnergy = 0;
        audioIntensity = visualIntensity;
      } else {
        // Reset to gentle, almost static breathing when paused/stopped
        visualIntensity = 0.12;
        previousEnergy = 0;
        audioIntensity = 0.12;
      }

      // Less smoothing for more responsive pulse effect
      smoothedIntensity = smoothedIntensity + (audioIntensity - smoothedIntensity) * 0.25;

      // Calculate scale based on audio intensity - more dramatic range
      const baseScale = 1;
      const maxScale = 1.2;
      const targetScale = baseScale + smoothedIntensity * (maxScale - baseScale);
      smoothedScale = smoothedScale + (targetScale - smoothedScale) * 0.15;

      // Get scene color
      const baseColor = {
        begin: [244, 197, 105],  // 朝阳金橙色
        deep: [126, 184, 232],   // 深海蓝
        flow: [232, 184, 74],    // 琥珀金
        unwind: [201, 132, 110]  // 日落红
      }[scenes[currentSceneIndex].id] || [168, 200, 236];

      // Dynamic opacity based on intensity
      const opacity = 0.8 + smoothedIntensity * 0.15;

      // Dynamic glow based on intensity - smaller, more subtle range
      const glowSize = 30 + smoothedIntensity * 60; // 30 to 90px
      const glowAlpha = 0.4 + smoothedIntensity * 0.3; // More subtle base glow
      const glowColor = `rgba(${baseColor.join(',')}, ${glowAlpha})`;

      playBtn.style.transform = `scale(${smoothedScale})`;
      playBtn.style.boxShadow = `0 0 ${glowSize}px ${smoothedIntensity * 15}px ${glowColor}`;
      playBtn.style.borderColor = `rgba(${baseColor.join(',')}, ${0.5 + smoothedIntensity * 0.3})`;
      playBtn.style.opacity = opacity;
      progressRing.style.stroke = `rgb(${baseColor.join(',')})`;
    }

    // Pomodoro Timer Functions
    const timerDisplay = document.getElementById('timerDisplay');

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updatePomodoroDisplay() {
      timerDisplay.textContent = formatTime(pomodoroTimeRemaining);

      // Set scene-specific color
      const sceneColors = {
        begin: 'rgba(244, 197, 105, ',
        deep: 'rgba(126, 184, 232, ',
        flow: 'rgba(232, 184, 74, ',
        unwind: 'rgba(201, 132, 110, '
      };
      const baseColor = sceneColors[scenes[currentSceneIndex].id] || 'rgba(255, 255, 255, ';
      timerDisplay.style.color = baseColor + '0.35)';
    }

    function startPomodoro() {
      if (!pomodoroIsRunning) {
        pomodoroIsRunning = true;
        timerDisplay.classList.add('active');
        startVisualizationLoop(); // Start visualization loop for progress ring
        pomodoroInterval = setInterval(() => {
          if (pomodoroTimeRemaining > 0) {
            pomodoroTimeRemaining--;
            updatePomodoroDisplay();
          } else {
            // Timer completed
            completePomodoroSession();
          }
        }, 1000);

        // Auto-play music when pomodoro starts
        startPlayback();
      }
    }

    function pausePomodoro() {
      if (pomodoroIsRunning) {
        pomodoroIsRunning = false;
        timerDisplay.classList.remove('active');
        clearInterval(pomodoroInterval);
        pomodoroInterval = null;
        stopVisualizationLoop(); // Stop visualization loop

        // Auto-pause music when pomodoro pauses
        pausePlayback();
      }
    }

    function resetPomodoro() {
      pausePomodoro();
      pomodoroTimeRemaining = pomodoroIsWorkSession ? pomodoroWorkDuration : pomodoroBreakDuration;
      updatePomodoroDisplay();
    }

    function completePomodoroSession() {
      pausePlayback();
      pomodoroIsRunning = false;
      clearInterval(pomodoroInterval);
      pomodoroInterval = null;
      timerDisplay.classList.remove('active');

      // Show completion feedback
      showCompletionFeedback();

      // Vibrate if on mobile
      if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100]);
      }
    }

    function showCompletionFeedback() {
      // Save original content
      const originalContent = timerDisplay.textContent;

      // Show checkmark
      timerDisplay.textContent = '✓';
      timerDisplay.style.fontSize = '24px';
      timerDisplay.style.opacity = '1';

      // Restore after 2 seconds
      setTimeout(() => {
        timerDisplay.textContent = originalContent;
        timerDisplay.style.fontSize = '';
        timerDisplay.style.opacity = '';

        // Reset to work mode
        pomodoroIsWorkSession = true;
        pomodoroTimeRemaining = pomodoroWorkDuration;
        updatePomodoroDisplay();
      }, 2000);
    }

    function togglePomodoro() {
      if (pomodoroIsRunning) {
        pausePomodoro();
      } else {
        startPomodoro();
      }
    }

    // Long press to reset
    let pomodoroLongPressTimer;
    let pomodoroIsLongPress = false;

    timerDisplay.addEventListener('mousedown', (e) => {
      e.preventDefault();
      pomodoroIsLongPress = false;
      pomodoroLongPressTimer = setTimeout(() => {
        pomodoroIsLongPress = true;
        resetPomodoro();
        // Visual feedback
        timerDisplay.style.opacity = '1';
        setTimeout(() => {
          timerDisplay.style.opacity = '';
        }, 200);
      }, 800);
    });

    timerDisplay.addEventListener('mouseup', () => {
      clearTimeout(pomodoroLongPressTimer);
    });

    timerDisplay.addEventListener('mouseleave', () => {
      clearTimeout(pomodoroLongPressTimer);
    });

    // Touch support for long press
    timerDisplay.addEventListener('touchstart', (e) => {
      e.preventDefault();
      pomodoroIsLongPress = false;
      pomodoroLongPressTimer = setTimeout(() => {
        pomodoroIsLongPress = true;
        resetPomodoro();
        if (navigator.vibrate) navigator.vibrate(50);
      }, 800);
    }, { passive: false });

    timerDisplay.addEventListener('touchend', () => {
      clearTimeout(pomodoroLongPressTimer);
    });

    // Note: Timer display is now read-only. Use play button to control Pomodoro.
    // Long press on timer still resets it.

    // Event Listeners
    playBtn.addEventListener('click', togglePlay);

    // Touch events
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchStartTime = Date.now();

      longPressTimer = setTimeout(() => {
        volumeOverlay.classList.add('active');
      }, 600);
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      clearTimeout(longPressTimer);
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      clearTimeout(longPressTimer);

      if (volumeOverlay.classList.contains('active')) {
        setTimeout(() => volumeOverlay.classList.remove('active'), 1500);
        return;
      }

      const touchEndX = e.changedTouches[0].clientX;
      const diffX = touchStartX - touchEndX;
      const duration = Date.now() - touchStartTime;

      if (Math.abs(diffX) > 50) {
        if (diffX > 0) {
          nextScene();
        } else {
          prevScene();
        }
      } else if (Math.abs(diffX) < 30) {
        // Any tap/click (not swipe) shows UI, regardless of duration
        showUI();
      }
    }, { passive: true });

    // Volume control
    function setVolumeFromTouch(clientY) {
      const rect = document.getElementById('volumeSlider').getBoundingClientRect();
      const percent = 1 - ((clientY - rect.top) / rect.height);
      const volume = Math.max(0, Math.min(1, percent));

      if (isIOS) {
        iosAudioPlayer.volume = volume;
      } else if (currentHowl) {
        currentHowl.volume(volume);
      }

      volumeFill.style.height = (volume * 100) + '%';
    }

    volumeOverlay.addEventListener('touchstart', (e) => {
      setVolumeFromTouch(e.touches[0].clientY);
    }, { passive: true });

    volumeOverlay.addEventListener('touchmove', (e) => {
      setVolumeFromTouch(e.touches[0].clientY);
    }, { passive: true });

    // Mouse click to show UI (exclude play button)
    document.addEventListener('click', (e) => {
      if (e.target !== playBtn && !playBtn.contains(e.target)) {
        showUI();
      }
    });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      } else if (e.code === 'ArrowRight') {
        nextScene();
      } else if (e.code === 'ArrowLeft') {
        prevScene();
      }
    });

    // Initialize - don't preload here, defer to first user interaction
    // This avoids creating AudioContext before user gesture on iOS
    loadScene(getSceneByTime());
    resetHideTimer();
    updatePomodoroDisplay(); // Initialize Pomodoro timer display
    startVisualizationLoop(); // Start visualization loop for Pomodoro progress ring

    // Aggressively preload on iOS via fetch() without waiting for user interaction
    // Desktop will wait for unlockAudio() to avoid Web Audio warnings.
    if (isIOS) {
      preloadAllMusic();
    }

    // Unlock audio on iOS - must happen on first user interaction
    let audioUnlocked = false;
    function unlockAudio() {
      if (audioUnlocked) return;
      audioUnlocked = true;

      // Force Howler to create AudioContext synchronously in user gesture
      Howler.volume(0.8);

      // Resume synchronously - don't await
      if (Howler.ctx && Howler.ctx.state === 'suspended') {
        Howler.ctx.resume().catch(e => console.warn('Failed to resume AudioContext:', e));
      }

      // Preload all music now that AudioContext exists
      preloadAllMusic();

      console.log('Audio unlocked');
    }

    // Unlock on first click/touch
    document.addEventListener('click', unlockAudio, { once: true });
    document.addEventListener('touchstart', unlockAudio, { once: true });
  </script>
