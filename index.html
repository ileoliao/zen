<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Harbor Zen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --scene-begin: #e8d5b7;
      --scene-deep: #a8c8ec;
      --scene-flow: #b8d4a8;
      --scene-unwind: #d4b8c8;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Inter', sans-serif;
      color: #fff;
      touch-action: pan-y;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .scene-indicator {
      position: absolute;
      top: 8vh;
      text-align: center;
      opacity: 0.9;
      transition: opacity 0.8s ease;
    }

    .scene-indicator.hidden {
      opacity: 0;
    }

    .scene-label {
      font-size: 11px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    .scene-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 0.15em;
      transition: color 0.6s ease;
    }

    .scene-name.begin { color: var(--scene-begin); }
    .scene-name.deep { color: var(--scene-deep); }
    .scene-name.flow { color: var(--scene-flow); }
    .scene-name.unwind { color: var(--scene-unwind); }

    .player-container {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .progress-ring {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg);
    }

    .progress-ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 1;
    }

    .progress-ring-fill {
      fill: none;
      stroke-width: 1;
      stroke-linecap: round;
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      transition: stroke-dashoffset 0.1s linear, stroke 0.6s ease;
    }

    .progress-ring-fill.begin { stroke: var(--scene-begin); }
    .progress-ring-fill.deep { stroke: var(--scene-deep); }
    .progress-ring-fill.flow { stroke: var(--scene-flow); }
    .progress-ring-fill.unwind { stroke: var(--scene-unwind); }

    .play-button {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .play-button:hover {
      background: rgba(255,255,255,0.06);
      transform: scale(1.02);
    }

    .play-button:active {
      transform: scale(0.96);
    }

    .play-button.playing {
      transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
    }

    .play-button.loading {
      cursor: wait;
    }

    .play-button.loading .play-icon {
      opacity: 0.3;
      animation: pulse-loading 1s ease-in-out infinite;
    }

    @keyframes pulse-loading {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    .play-button.begin { box-shadow: 0 0 60px -20px var(--scene-begin); }
    .play-button.deep { box-shadow: 0 0 60px -20px var(--scene-deep); }
    .play-button.flow { box-shadow: 0 0 60px -20px var(--scene-flow); }
    .play-button.unwind { box-shadow: 0 0 60px -20px var(--scene-unwind); }

    .play-icon {
      width: 32px;
      height: 32px;
      fill: currentColor;
      opacity: 0.9;
      transition: all 0.3s ease;
    }

    .play-button:hover .play-icon {
      opacity: 1;
      transform: scale(1.1);
    }

    .track-info {
      position: absolute;
      bottom: 8vh;
      text-align: center;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    .track-info.visible {
      opacity: 0.7;
    }

    .track-name {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .track-artist {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
    }

    .swipe-hint {
      position: absolute;
      bottom: 4vh;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .swipe-hint.visible {
      opacity: 1;
    }

    .volume-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .volume-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .volume-slider-vertical {
      width: 4px;
      height: 200px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }

    .volume-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 2px;
      transition: height 0.1s ease;
    }

    .volume-label {
      margin-top: 24px;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .scene-name {
        font-size: 28px;
      }
      
      .player-container {
        width: 120px;
        height: 120px;
      }
      
      .play-button {
        inset: 16px;
      }
      
      .play-icon {
        width: 28px;
        height: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="scene-indicator" id="sceneIndicator">
      <div class="scene-label">Current State</div>
      <div class="scene-name" id="sceneName">Deep Work</div>
    </div>

    <div class="player-container">
      <svg class="progress-ring" viewBox="0 0 140 140">
        <circle class="progress-ring-bg" cx="70" cy="70" r="70"/>
        <circle class="progress-ring-fill" id="progressRing" cx="70" cy="70" r="70"/>
      </svg>
      
      <button class="play-button" id="playBtn">
        <svg class="play-icon" id="playIcon" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg class="play-icon" id="pauseIcon" viewBox="0 0 24 24" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
    </div>

    <div class="track-info" id="trackInfo">
      <div class="track-name" id="trackName">Morning Light</div>
      <div class="track-artist" id="trackArtist">Piano Ambient</div>
    </div>

    <div class="swipe-hint" id="swipeHint">Swipe to change</div>

    <div class="volume-overlay" id="volumeOverlay">
      <div class="volume-slider-vertical" id="volumeSlider">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
      <div class="volume-label">Volume</div>
    </div>
  </div>

  <script>
    const scenes = [
      {
        id: 'begin',
        name: 'Begin',
        startHour: 8,
        endHour: 10,
        tracks: [
          { title: 'Morning Start', artist: 'Harbor Zen', file: 'Harbor Zen - Piano 1.mp3' }
        ]
      },
      {
        id: 'deep',
        name: 'Deep Work',
        startHour: 10,
        endHour: 13,
        tracks: [
          { title: 'Deep Piano', artist: 'Harbor Zen', file: 'Harbor Zen - Piano 2.mp3' },
          { title: 'Focus Guitar', artist: 'Harbor Zen', file: 'Harbor Zen - Guitar 1.mp3' },
          { title: 'Flow Guitar', artist: 'Harbor Zen', file: 'Harbor Zen - Guitar 2.mp3' }
        ]
      },
      {
        id: 'flow',
        name: 'Flow',
        startHour: 13,
        endHour: 17,
        tracks: [
          { title: 'Afternoon Piano', artist: 'Harbor Zen', file: 'Harbor Zen - Piano 3.mp3' }
        ]
      },
      {
        id: 'unwind',
        name: 'Unwind',
        startHour: 17,
        endHour: 19,
        tracks: [
          { title: 'Evening Close', artist: 'Harbor Zen', file: 'Harbor Zen - Piano4.mp3' }
        ]
      }
    ];

    let currentSceneIndex = 0;
    let currentTrackIndex = 0;
    let isPlaying = false;
    let audio = new Audio();
    audio.volume = 0.7;
    let audioContext = null;
    let analyser = null;
    let dataArray = null;
    let animationId = null;
    let smoothedIntensity = 0;
    let smoothedScale = 1;

    const sceneIndicator = document.getElementById('sceneIndicator');
    const sceneName = document.getElementById('sceneName');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const progressRing = document.getElementById('progressRing');
    const trackInfo = document.getElementById('trackInfo');
    const trackName = document.getElementById('trackName');
    const trackArtist = document.getElementById('trackArtist');
    const swipeHint = document.getElementById('swipeHint');
    const volumeOverlay = document.getElementById('volumeOverlay');
    const volumeFill = document.getElementById('volumeFill');

    let hideTimeout;
    let touchStartX = 0;
    let touchStartY = 0;
    let touchStartTime = 0;
    let longPressTimer;
    const preloadedAudio = {};
    let loadingProgress = 0;
    let totalFilesToLoad = 0;

    // Preload all music files using fetch for reliable caching
    async function preloadAllMusic() {
      const allFiles = [];
      scenes.forEach(scene => {
        scene.tracks.forEach(track => {
          if (!allFiles.includes(track.file)) {
            allFiles.push(track.file);
          }
        });
      });

      totalFilesToLoad = allFiles.length;
      
      // Load files concurrently with retry logic
      const loadPromises = allFiles.map(file => loadAudioFile(file));
      
      try {
        await Promise.all(loadPromises);
        console.log('All audio files preloaded successfully');
      } catch (error) {
        console.error('Some files failed to preload:', error);
      }
    }

    async function loadAudioFile(filename, retries = 3) {
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(`music/${filename}`);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          
          const blob = await response.blob();
          const blobUrl = URL.createObjectURL(blob);
          preloadedAudio[filename] = blobUrl;
          
          loadingProgress++;
          return;
        } catch (error) {
          console.warn(`Failed to load ${filename}, attempt ${i + 1}/${retries}`, error);
          if (i === retries - 1) {
            // Last retry failed, use direct URL as fallback
            preloadedAudio[filename] = `music/${filename}`;
          }
          // Wait before retrying (exponential backoff)
          await new Promise(resolve => setTimeout(resolve, 1000 * Math.pow(2, i)));
        }
      }
    }

    // Start preloading on page load
    preloadAllMusic();

    function getSceneByTime() {
      const hour = new Date().getHours();
      const index = scenes.findIndex(s => hour >= s.startHour && hour < s.endHour);
      return index !== -1 ? index : 3;
    }

    function loadScene(index) {
      currentSceneIndex = index;
      const scene = scenes[index];
      
      sceneName.textContent = scene.name;
      sceneName.className = 'scene-name ' + scene.id;
      playBtn.className = 'play-button ' + scene.id + (isPlaying ? ' playing' : '');
      progressRing.className = 'progress-ring-fill ' + scene.id;
      
      currentTrackIndex = 0;
      loadTrack();
    }

    function loadTrack() {
      const scene = scenes[currentSceneIndex];
      const track = scene.tracks[currentTrackIndex];
      
      trackName.textContent = track.title;
      trackArtist.textContent = track.artist;
      
      // Stop current audio before switching
      if (isPlaying) {
        audio.pause();
      }
      
      // Use preloaded blob URL for smooth playback
      const audioUrl = preloadedAudio[track.file];
      if (audioUrl) {
        audio.src = audioUrl;
      } else {
        // Fallback to direct URL if not preloaded yet
        audio.src = `music/${track.file}`;
      }
      
      // Ensure audio is ready before playing
      audio.load();
    }

    let isBuffering = false;

    function togglePlay() {
      if (isBuffering) return; // Prevent clicks while buffering
      
      isPlaying = !isPlaying;
      
      if (isPlaying) {
        startPlayback();
      } else {
        pausePlayback();
      }
      
      resetHideTimer();
    }

    async function startPlayback() {
      playBtn.classList.add('loading');
      
      try {
        // Wait for audio to be ready
        if (audio.readyState < 3) {
          isBuffering = true;
          await waitForAudioReady();
        }
        
        initAudioContext();
        await audio.play();
        
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
        playBtn.classList.remove('loading');
        playBtn.classList.add('playing');
        showTrackInfo();
        
        if (animationId) cancelAnimationFrame(animationId);
        visualize();
      } catch (error) {
        console.error('Playback failed:', error);
        isPlaying = false;
        playBtn.classList.remove('loading');
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
      } finally {
        isBuffering = false;
      }
    }

    function pausePlayback() {
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
      playBtn.classList.remove('playing');
      audio.pause();
      if (animationId) cancelAnimationFrame(animationId);
      // Reset visual effects
      playBtn.style.transform = '';
      playBtn.style.boxShadow = '';
      playBtn.style.borderColor = '';
      playBtn.style.opacity = '';
      progressRing.style.stroke = '';
      progressRing.style.filter = '';
      smoothedIntensity = 0;
      smoothedScale = 1;
    }

    function waitForAudioReady() {
      return new Promise((resolve, reject) => {
        const checkReady = () => {
          if (audio.readyState >= 3) {
            resolve();
          } else if (audio.error) {
            reject(audio.error);
          } else {
            setTimeout(checkReady, 100);
          }
        };
        checkReady();
        
        // Timeout after 10 seconds
        setTimeout(() => reject(new Error('Audio load timeout')), 10000);
      });
    }

    function initAudioContext() {
      if (!audioContext) {
        // Create audio context with optimal latency hint
        audioContext = new (window.AudioContext || window.webkitAudioContext)({
          latencyHint: 'playback'
        });
        
        // Create nodes
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 512;
        analyser.smoothingTimeConstant = 0.85;
        analyser.minDecibels = -90;
        analyser.maxDecibels = -10;
        
        // Add compressor to prevent clipping/distortion
        const compressor = audioContext.createDynamicsCompressor();
        compressor.threshold.value = -24;  // Start compressing at -24dB
        compressor.knee.value = 30;        // Soft knee for smooth transition
        compressor.ratio.value = 12;       // Strong compression ratio
        compressor.attack.value = 0.003;   // Fast attack (3ms)
        compressor.release.value = 0.25;   // Medium release (250ms)
        
        // Add gain node for volume control
        const gainNode = audioContext.createGain();
        gainNode.gain.value = 0.9;         // Slight headroom to prevent clipping
        
        // Connect the chain: source -> analyser -> compressor -> gain -> destination
        const source = audioContext.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(compressor);
        compressor.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        
        // Store references for cleanup if needed
        audioContext._compressor = compressor;
        audioContext._gainNode = gainNode;
      }
      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }
    }

    function visualize() {
      if (!isPlaying || !analyser) return;
      
      analyser.getByteFrequencyData(dataArray);
      
      // Piano-friendly frequency analysis
      // Piano range: A0(27.5Hz) to C8(4186Hz) - mostly in mid-range
      
      // Get bass frequencies (0-200Hz, bins 0-5) - for left hand piano
      let bassSum = 0;
      for (let i = 0; i < 6; i++) {
        bassSum += dataArray[i];
      }
      const bassIntensity = bassSum / 6 / 255;
      
      // Get mid frequencies (200-2000Hz, bins 6-50) - MAIN PIANO RANGE
      let midSum = 0;
      for (let i = 6; i < 50; i++) {
        midSum += dataArray[i];
      }
      const midIntensity = midSum / (50 - 6) / 255;
      
      // Get high frequencies (2000Hz+, bins 51+) - piano harmonics
      let highSum = 0;
      for (let i = 50; i < dataArray.length; i++) {
        highSum += dataArray[i];
      }
      const highIntensity = highSum / (dataArray.length - 50) / 255;
      
      // Combined intensity - weighted toward mid-range for piano
      let intensity = (bassIntensity * 0.3 + midIntensity * 0.5 + highIntensity * 0.2);
      
      // Exponential amplification for more sensitivity at low volumes
      // Piano is often gentle, so we need to boost lower intensities
      intensity = Math.pow(intensity, 0.6);
      
      // Dynamic scale with more dramatic range
      const baseScale = 1;
      const maxScale = 1.25; // Increased from 1.15
      const scale = baseScale + (intensity * (maxScale - baseScale));
      
      // Dynamic color with more sensitivity
      const baseHue = {
        begin: 35,
        deep: 210,
        flow: 100,
        unwind: 320
      }[scenes[currentSceneIndex].id] || 200;
      
      // More dramatic hue shifts based on bass
      const hueShift = Math.sin(Date.now() / 2000) * 15 + bassIntensity * 25;
      const hue = baseHue + hueShift;
      
      // Higher base saturation for piano to make colors pop
      const saturation = 45 + (intensity * 55); // 45% to 100%
      const lightness = 55 + (midIntensity * 35); // 55% to 90%
      
      // Smooth transitions using lerp (linear interpolation)
      const lerpFactor = 0.12; // Adjust for more/less smoothing (0.1 = smooth, 0.3 = responsive)
      smoothedIntensity = smoothedIntensity + (intensity - smoothedIntensity) * lerpFactor;
      smoothedScale = smoothedScale + (scale - smoothedScale) * lerpFactor;
      
      const glowColor = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
      
      // Much more dramatic glow range based on smoothed intensity
      const glowIntensity = 25 + (smoothedIntensity * 100); // 25 to 125
      const glowBlur = 5 + (smoothedIntensity * 15); // 5 to 20
      
      // Apply dynamic styles with smoothed values
      playBtn.style.transform = `scale(${smoothedScale})`;
      playBtn.style.boxShadow = `0 0 ${glowIntensity}px -${glowBlur}px ${glowColor}`;
      playBtn.style.borderColor = glowColor;
      
      progressRing.style.stroke = glowColor;
      progressRing.style.filter = `drop-shadow(0 0 ${smoothedIntensity * 15}px ${glowColor})`;
      
      // Add subtle opacity pulsing for extra life
      playBtn.style.opacity = 0.85 + (smoothedIntensity * 0.15);
      
      animationId = requestAnimationFrame(visualize);
    }

    function play() {
      isPlaying = true;
      startPlayback();
    }

    function nextScene() {
      loadScene((currentSceneIndex + 1) % scenes.length);
      play();
      showUI();
    }

    function prevScene() {
      loadScene((currentSceneIndex - 1 + scenes.length) % scenes.length);
      play();
      showUI();
    }

    function showTrackInfo() {
      trackInfo.classList.add('visible');
      resetHideTimer();
    }

    function showUI() {
      sceneIndicator.classList.remove('hidden');
      trackInfo.classList.add('visible');
      swipeHint.classList.add('visible');
      resetHideTimer();
    }

    function hideUI() {
      sceneIndicator.classList.add('hidden');
      trackInfo.classList.remove('visible');
      swipeHint.classList.remove('visible');
    }

    function resetHideTimer() {
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(hideUI, 4000);
    }

    function updateProgress() {
      if (!audio.duration) return;
      const progress = audio.currentTime / audio.duration;
      const circumference = 440;
      const offset = circumference - (progress * circumference);
      progressRing.style.strokeDashoffset = offset;
    }

    function showVolume() {
      volumeOverlay.classList.add('active');
      volumeFill.style.height = (audio.volume * 100) + '%';
    }

    function hideVolume() {
      volumeOverlay.classList.remove('active');
    }

    function setVolumeFromTouch(clientY) {
      const rect = document.getElementById('volumeSlider').getBoundingClientRect();
      const percent = 1 - ((clientY - rect.top) / rect.height);
      audio.volume = Math.max(0, Math.min(1, percent));
      volumeFill.style.height = (audio.volume * 100) + '%';
    }

    // Event Listeners
    playBtn.addEventListener('click', togglePlay);

    // Touch events for swipe and long press
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchStartTime = Date.now();
      
      longPressTimer = setTimeout(() => {
        showVolume();
      }, 600);
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      clearTimeout(longPressTimer);
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      clearTimeout(longPressTimer);
      
      if (volumeOverlay.classList.contains('active')) {
        setTimeout(hideVolume, 1500);
        return;
      }

      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      const diffX = touchStartX - touchEndX;
      const diffY = touchStartY - touchEndY;
      const duration = Date.now() - touchStartTime;

      // Detect swipe (minimum 50px movement)
      if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
        if (diffX > 0) {
          nextScene();
        } else {
          prevScene();
        }
      } else if (duration < 200 && Math.abs(diffX) < 10 && Math.abs(diffY) < 10) {
        // Tap - show UI
        showUI();
      }
    }, { passive: true });

    // Volume slider touch events
    let isDraggingVolume = false;

    volumeOverlay.addEventListener('touchstart', (e) => {
      isDraggingVolume = true;
      setVolumeFromTouch(e.touches[0].clientY);
    }, { passive: true });

    volumeOverlay.addEventListener('touchmove', (e) => {
      if (isDraggingVolume) {
        setVolumeFromTouch(e.touches[0].clientY);
      }
    }, { passive: true });

    volumeOverlay.addEventListener('touchend', () => {
      isDraggingVolume = false;
    });

    // Mouse events for desktop
    let mouseDown = false;

    document.addEventListener('mousedown', (e) => {
      mouseDown = true;
      touchStartX = e.clientX;
      touchStartTime = Date.now();
      
      longPressTimer = setTimeout(() => {
        showVolume();
      }, 600);
    });

    document.addEventListener('mouseup', (e) => {
      mouseDown = false;
      clearTimeout(longPressTimer);
      
      if (volumeOverlay.classList.contains('active')) {
        setTimeout(hideVolume, 1500);
        return;
      }

      const diffX = touchStartX - e.clientX;
      const duration = Date.now() - touchStartTime;

      if (Math.abs(diffX) > 50) {
        if (diffX > 0) {
          nextScene();
        } else {
          prevScene();
        }
      } else if (duration < 200 && e.target === document.body || e.target.classList.contains('app')) {
        showUI();
      }
    });

    // Audio events
    audio.addEventListener('timeupdate', updateProgress);
    
    audio.addEventListener('waiting', () => {
      // Audio is buffering
      isBuffering = true;
      playBtn.classList.add('loading');
    });
    
    audio.addEventListener('canplay', () => {
      // Audio can start playing
      if (isBuffering) {
        isBuffering = false;
        playBtn.classList.remove('loading');
      }
    });
    
    audio.addEventListener('canplaythrough', () => {
      // Audio can play without further buffering
      isBuffering = false;
      playBtn.classList.remove('loading');
    });
    
    audio.addEventListener('ended', () => {
      currentTrackIndex = (currentTrackIndex + 1) % scenes[currentSceneIndex].tracks.length;
      loadTrack();
      if (isPlaying) {
        isBuffering = false;
        startPlayback();
      }
    });
    
    audio.addEventListener('error', (e) => {
      console.error('Audio error:', e);
      isBuffering = false;
      playBtn.classList.remove('loading');
      // Try to recover by reloading current track
      if (isPlaying) {
        setTimeout(() => {
          loadTrack();
          startPlayback();
        }, 1000);
      }
    });
    
    audio.addEventListener('stalled', () => {
      console.warn('Audio stalled - network issue');
      isBuffering = true;
      playBtn.classList.add('loading');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      } else if (e.code === 'ArrowRight') {
        nextScene();
      } else if (e.code === 'ArrowLeft') {
        prevScene();
      }
    });

    // Initialize
    loadScene(getSceneByTime());
    resetHideTimer();
  </script>
</body>
</html>
