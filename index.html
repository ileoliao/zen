<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Harbor Zen</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      touch-action: pan-y;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .scene-indicator {
      position: absolute;
      top: 8vh;
      text-align: center;
      opacity: 0.9;
      transition: opacity 0.8s ease;
    }

    .scene-indicator.hidden {
      opacity: 0;
    }

    .scene-label {
      font-size: 11px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    .scene-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 0.15em;
      transition: color 0.6s ease;
    }

    .scene-name.begin { color: #e8d5b7; }
    .scene-name.deep { color: #a8c8ec; }
    .scene-name.flow { color: #b8d4a8; }
    .scene-name.unwind { color: #d4b8c8; }

    .player-container {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .progress-ring {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg);
    }

    .progress-ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 1;
    }

    .progress-ring-fill {
      fill: none;
      stroke-width: 1;
      stroke-linecap: round;
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      transition: stroke-dashoffset 0.1s linear, stroke 0.6s ease;
    }

    .play-button {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .play-button:hover {
      background: rgba(255,255,255,0.06);
      transform: scale(1.02);
    }

    .play-button:active {
      transform: scale(0.96);
    }

    .play-button.playing {
      transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
    }

    .play-button.loading {
      cursor: wait;
    }

    .play-button.loading .play-icon {
      opacity: 0.3;
      animation: pulse-loading 1s ease-in-out infinite;
    }

    @keyframes pulse-loading {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    .play-icon {
      width: 32px;
      height: 32px;
      fill: currentColor;
      opacity: 0.9;
      transition: all 0.3s ease;
    }

    .track-info {
      position: absolute;
      bottom: 8vh;
      text-align: center;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    .track-info.visible {
      opacity: 0.7;
    }

    .track-name {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .track-artist {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
    }

    .swipe-hint {
      position: absolute;
      bottom: 4vh;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .swipe-hint.visible {
      opacity: 1;
    }

    .volume-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .volume-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .volume-slider-vertical {
      width: 4px;
      height: 200px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }

    .volume-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 2px;
      transition: height 0.1s ease;
    }

    .volume-label {
      margin-top: 24px;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="scene-indicator" id="sceneIndicator">
      <div class="scene-label">Current State</div>
      <div class="scene-name" id="sceneName">Deep Work</div>
    </div>

    <div class="player-container">
      <svg class="progress-ring" viewBox="0 0 140 140">
        <circle class="progress-ring-bg" cx="70" cy="70" r="70"/>
        <circle class="progress-ring-fill" id="progressRing" cx="70" cy="70" r="70"/>
      </svg>
      
      <button class="play-button" id="playBtn">
        <svg class="play-icon" id="playIcon" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg class="play-icon" id="pauseIcon" viewBox="0 0 24 24" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
    </div>

    <div class="track-info" id="trackInfo">
      <div class="track-name" id="trackName">Morning Light</div>
      <div class="track-artist" id="trackArtist">Piano Ambient</div>
    </div>

    <div class="swipe-hint" id="swipeHint">Swipe to change</div>

    <div class="volume-overlay" id="volumeOverlay">
      <div class="volume-slider-vertical" id="volumeSlider">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
      <div class="volume-label">Volume</div>
    </div>
  </div>

  <script>
    const scenes = [
      {
        id: 'begin',
        name: 'Begin',
        startHour: 8,
        endHour: 10,
        tracks: [
          { title: 'Morning Start', artist: 'Harbor Zen', file: 'Harbor Zen - Piano 1.mp3' }
        ]
      },
      {
        id: 'deep',
        name: 'Deep Work',
        startHour: 10,
        endHour: 13,
        tracks: [
          { title: 'Deep Piano', artist: 'Harbor Zen', file: 'Harbor Zen - Piano 2.mp3' },
          { title: 'Focus Guitar', artist: 'Harbor Zen', file: 'Harbor Zen - Guitar 1.mp3' },
          { title: 'Flow Guitar', artist: 'Harbor Zen', file: 'Harbor Zen - Guitar 2.mp3' }
        ]
      },
      {
        id: 'flow',
        name: 'Flow',
        startHour: 13,
        endHour: 17,
        tracks: [
          { title: 'Afternoon Piano', artist: 'Harbor Zen', file: 'Harbor Zen - Piano 3.mp3' }
        ]
      },
      {
        id: 'unwind',
        name: 'Unwind',
        startHour: 17,
        endHour: 19,
        tracks: [
          { title: 'Evening Close', artist: 'Harbor Zen', file: 'Harbor Zen - Piano4.mp3' }
        ]
      }
    ];

    let currentSceneIndex = 0;
    let currentTrackIndex = 0;
    let isPlaying = false;
    let currentHowl = null;
    let smoothedIntensity = 0;
    let smoothedScale = 1;
    let animationId = null;

    const sceneIndicator = document.getElementById('sceneIndicator');
    const sceneName = document.getElementById('sceneName');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const progressRing = document.getElementById('progressRing');
    const trackInfo = document.getElementById('trackInfo');
    const trackName = document.getElementById('trackName');
    const trackArtist = document.getElementById('trackArtist');
    const swipeHint = document.getElementById('swipeHint');
    const volumeOverlay = document.getElementById('volumeOverlay');
    const volumeFill = document.getElementById('volumeFill');

    let hideTimeout;
    let touchStartX = 0;
    let touchStartY = 0;
    let touchStartTime = 0;
    let longPressTimer;

    // Preload all audio using Howler
    const preloadedSounds = {};
    
    function preloadAllMusic() {
      const allFiles = [];
      scenes.forEach(scene => {
        scene.tracks.forEach(track => {
          if (!allFiles.includes(track.file)) {
            allFiles.push(track.file);
          }
        });
      });

      allFiles.forEach(file => {
        preloadedSounds[file] = new Howl({
          src: [`music/${file}`],
          html5: true, // Force HTML5 Audio for better streaming
          preload: true,
          volume: 0.8,
          onload: function() {
            console.log(`Loaded: ${file}`);
          },
          onloaderror: function(id, err) {
            console.error(`Failed to load ${file}:`, err);
          }
        });
      });
    }

    function getSceneByTime() {
      const hour = new Date().getHours();
      const index = scenes.findIndex(s => hour >= s.startHour && hour < s.endHour);
      return index !== -1 ? index : 3;
    }

    function loadScene(index) {
      currentSceneIndex = index;
      const scene = scenes[index];
      
      sceneName.textContent = scene.name;
      sceneName.className = 'scene-name ' + scene.id;
      playBtn.className = 'play-button ' + scene.id + (isPlaying ? ' playing' : '');
      progressRing.className = 'progress-ring-fill ' + scene.id;
      
      currentTrackIndex = 0;
      loadTrack();
    }

    function loadTrack() {
      const scene = scenes[currentSceneIndex];
      const track = scene.tracks[currentTrackIndex];
      
      trackName.textContent = track.title;
      trackArtist.textContent = track.artist;
      
      // Stop current playback
      if (currentHowl) {
        currentHowl.stop();
        currentHowl.unload();
      }
      
      // Use preloaded Howl or create new one
      const file = track.file;
      if (preloadedSounds[file]) {
        currentHowl = preloadedSounds[file];
      } else {
        currentHowl = new Howl({
          src: [`music/${file}`],
          html5: true,
          volume: 0.8
        });
      }
      
      // Set up event listeners
      currentHowl.on('end', onTrackEnd);
      currentHowl.on('load', () => {
        playBtn.classList.remove('loading');
      });
      currentHowl.on('loaderror', (id, err) => {
        console.error('Load error:', err);
        playBtn.classList.remove('loading');
      });
    }

    function onTrackEnd() {
      currentTrackIndex = (currentTrackIndex + 1) % scenes[currentSceneIndex].tracks.length;
      loadTrack();
      if (isPlaying) {
        startPlayback();
      }
    }

    function togglePlay() {
      if (playBtn.classList.contains('loading')) return;
      
      isPlaying = !isPlaying;
      
      if (isPlaying) {
        startPlayback();
      } else {
        pausePlayback();
      }
      
      resetHideTimer();
    }

    function startPlayback() {
      playBtn.classList.add('loading');
      
      if (!currentHowl) {
        loadTrack();
      }
      
      // Check if already loaded
      if (currentHowl.state() === 'loaded') {
        currentHowl.play();
        onPlaybackStart();
      } else {
        // Wait for load
        currentHowl.once('load', () => {
          currentHowl.play();
          onPlaybackStart();
        });
      }
    }

    function onPlaybackStart() {
      playBtn.classList.remove('loading');
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'block';
      playBtn.classList.add('playing');
      showTrackInfo();
      
      if (animationId) cancelAnimationFrame(animationId);
      visualize();
    }

    function pausePlayback() {
      if (currentHowl) {
        currentHowl.pause();
      }
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
      playBtn.classList.remove('playing');
      if (animationId) cancelAnimationFrame(animationId);
      resetVisualEffects();
    }

    function resetVisualEffects() {
      playBtn.style.transform = '';
      playBtn.style.boxShadow = '';
      playBtn.style.borderColor = '';
      playBtn.style.opacity = '';
      progressRing.style.stroke = '';
      progressRing.style.filter = '';
      smoothedIntensity = 0;
      smoothedScale = 1;
    }

    function play() {
      isPlaying = true;
      startPlayback();
    }

    function nextScene() {
      loadScene((currentSceneIndex + 1) % scenes.length);
      play();
      showUI();
    }

    function prevScene() {
      loadScene((currentSceneIndex - 1 + scenes.length) % scenes.length);
      play();
      showUI();
    }

    function showTrackInfo() {
      trackInfo.classList.add('visible');
      resetHideTimer();
    }

    function showUI() {
      sceneIndicator.classList.remove('hidden');
      trackInfo.classList.add('visible');
      swipeHint.classList.add('visible');
      resetHideTimer();
    }

    function hideUI() {
      sceneIndicator.classList.add('hidden');
      trackInfo.classList.remove('visible');
      swipeHint.classList.remove('visible');
    }

    function resetHideTimer() {
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(hideUI, 4000);
    }

    function updateProgress() {
      if (!currentHowl || !isPlaying) return;
      const progress = currentHowl.seek() / currentHowl.duration();
      const circumference = 440;
      const offset = circumference - (progress * circumference);
      progressRing.style.strokeDashoffset = offset;
    }

    // Simplified visualization without audio context
    function visualize() {
      if (!isPlaying) return;
      
      // Update progress ring
      updateProgress();
      
      // Gentle breathing animation (not tied to audio)
      const time = Date.now() / 1000;
      const breatheScale = 1 + Math.sin(time * 0.5) * 0.03;
      const breatheOpacity = 0.85 + Math.sin(time * 0.5) * 0.1;
      
      // Get scene color
      const baseColor = {
        begin: [232, 213, 183],
        deep: [168, 200, 236],
        flow: [184, 212, 168],
        unwind: [212, 184, 200]
      }[scenes[currentSceneIndex].id] || [168, 200, 236];
      
      const glowColor = `rgba(${baseColor.join(',')}, ${0.4 + Math.sin(time) * 0.2})`;
      
      playBtn.style.transform = `scale(${breatheScale})`;
      playBtn.style.boxShadow = `0 0 ${60 + Math.sin(time) * 20}px -10px ${glowColor}`;
      playBtn.style.borderColor = glowColor;
      playBtn.style.opacity = breatheOpacity;
      progressRing.style.stroke = `rgb(${baseColor.join(',')})`;
      
      animationId = requestAnimationFrame(visualize);
    }

    // Event Listeners
    playBtn.addEventListener('click', togglePlay);

    // Touch events
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchStartTime = Date.now();
      
      longPressTimer = setTimeout(() => {
        volumeOverlay.classList.add('active');
      }, 600);
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      clearTimeout(longPressTimer);
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      clearTimeout(longPressTimer);
      
      if (volumeOverlay.classList.contains('active')) {
        setTimeout(() => volumeOverlay.classList.remove('active'), 1500);
        return;
      }

      const touchEndX = e.changedTouches[0].clientX;
      const diffX = touchStartX - touchEndX;
      const duration = Date.now() - touchStartTime;

      if (Math.abs(diffX) > 50) {
        if (diffX > 0) {
          nextScene();
        } else {
          prevScene();
        }
      } else if (duration < 200 && Math.abs(diffX) < 10) {
        showUI();
      }
    }, { passive: true });

    // Volume control
    function setVolumeFromTouch(clientY) {
      const rect = document.getElementById('volumeSlider').getBoundingClientRect();
      const percent = 1 - ((clientY - rect.top) / rect.height);
      const volume = Math.max(0, Math.min(1, percent));
      if (currentHowl) {
        currentHowl.volume(volume);
      }
      volumeFill.style.height = (volume * 100) + '%';
    }

    volumeOverlay.addEventListener('touchstart', (e) => {
      setVolumeFromTouch(e.touches[0].clientY);
    }, { passive: true });

    volumeOverlay.addEventListener('touchmove', (e) => {
      setVolumeFromTouch(e.touches[0].clientY);
    }, { passive: true });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      } else if (e.code === 'ArrowRight') {
        nextScene();
      } else if (e.code === 'ArrowLeft') {
        prevScene();
      }
    });

    // Initialize
    preloadAllMusic();
    loadScene(getSceneByTime());
    resetHideTimer();
  </script>
</body>
</html>
