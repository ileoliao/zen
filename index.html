<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Harbor Zen</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      touch-action: pan-y;
    }

    /* Elegant background layers */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      min-width: 100vw;
      min-height: 100vh;
    }

    /* Deep gradient base */
    .bg-gradient {
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(232, 213, 183, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 200, 236, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(20, 20, 30, 0.8) 0%, rgba(10, 10, 15, 1) 100%);
      transition: all 2s ease;
    }

    .bg-gradient.begin {
      background:
        /* 朝阳主光芒 - 从左侧升起的金色阳光 */
        radial-gradient(ellipse at 15% 30%, rgba(255, 200, 100, 0.2) 0%, transparent 50%),
        /* 朝霞粉橙色过渡 */
        radial-gradient(ellipse at 40% 20%, rgba(255, 160, 120, 0.12) 0%, transparent 45%),
        /* 天空淡紫色 */
        radial-gradient(ellipse at 70% 25%, rgba(200, 160, 200, 0.08) 0%, transparent 50%),
        /* 底部深色地平线 */
        radial-gradient(ellipse at 50% 100%, rgba(40, 30, 35, 0.6) 0%, transparent 60%),
        /* 基础暗色背景 */
        radial-gradient(ellipse at 50% 50%, rgba(30, 25, 30, 0.95) 0%, rgba(15, 12, 15, 1) 100%);
    }

    .bg-gradient.deep {
      background:
        /* 深海主光源 - 深邃的蓝色光芒 */
        radial-gradient(ellipse at 30% 40%, rgba(80, 140, 200, 0.18) 0%, transparent 55%),
        /* 中层水域的幽蓝 */
        radial-gradient(ellipse at 70% 60%, rgba(60, 100, 160, 0.1) 0%, transparent 50%),
        /* 深海暗处 */
        radial-gradient(ellipse at 50% 50%, rgba(12, 20, 35, 0.95) 0%, rgba(8, 12, 22, 1) 100%);
    }

    .bg-gradient.flow {
      background:
        /* 下午暖阳 - 琥珀色光芒 */
        radial-gradient(ellipse at 35% 35%, rgba(232, 184, 74, 0.15) 0%, transparent 50%),
        /* 蜂蜜色调过渡 */
        radial-gradient(ellipse at 65% 50%, rgba(200, 160, 80, 0.1) 0%, transparent 45%),
        /* 温暖的工作氛围 */
        radial-gradient(ellipse at 50% 50%, rgba(30, 25, 20, 0.92) 0%, rgba(18, 15, 12, 1) 100%);
    }

    .bg-gradient.unwind {
      background:
        /* 日落余晖 - 深红/酒红色光芒 */
        radial-gradient(ellipse at 40% 45%, rgba(180, 100, 80, 0.16) 0%, transparent 50%),
        /* 黄昏的暖橙过渡 */
        radial-gradient(ellipse at 60% 55%, rgba(160, 90, 70, 0.1) 0%, transparent 48%),
        /* 夜晚降临的深色 */
        radial-gradient(ellipse at 50% 50%, rgba(25, 18, 20, 0.94) 0%, rgba(15, 12, 14, 1) 100%);
    }

    /* Subtle noise texture overlay */
    .bg-noise {
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      background-size: 300% 300%;
      animation: noise 15s steps(10) infinite;
    }

    @keyframes noise {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-0.5%, -0.5%); }
      20% { transform: translate(-1%, 0.5%); }
      30% { transform: translate(0.5%, -1%); }
      40% { transform: translate(-0.5%, 1%); }
      50% { transform: translate(-1%, 0.5%); }
      60% { transform: translate(1%, 0); }
      70% { transform: translate(0, 1%); }
      80% { transform: translate(-1%, 0); }
      90% { transform: translate(0.5%, 0.5%); }
    }

    /* Slow flowing aurora effect */
    .bg-aurora {
      background: 
        radial-gradient(circle at 30% 50%, rgba(255,255,255,0.02) 0%, transparent 50%),
        radial-gradient(circle at 70% 50%, rgba(255,255,255,0.015) 0%, transparent 50%);
      background-size: 150% 150%;
      animation: aurora 40s ease-in-out infinite;
    }

    @keyframes aurora {
      0%, 100% {
        transform: translateX(0) scale(1);
        opacity: 1;
      }
      33% {
        transform: translateX(0.5%) scale(1.005);
        opacity: 0.8;
      }
      66% {
        transform: translateX(-0.5%) scale(0.995);
        opacity: 0.9;
      }
    }

    /* Vignette overlay for depth */
    .bg-vignette {
      background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.4) 100%);
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .scene-indicator {
      position: absolute;
      top: 8vh;
      text-align: center;
      opacity: 0.9;
      transition: opacity 0.8s ease;
    }

    .scene-indicator.hidden {
      opacity: 0;
    }

    .scene-label {
      font-size: 11px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    .scene-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 0.15em;
      transition: color 0.6s ease;
    }

    .scene-name.begin { color: #f4c569; }
    .scene-name.deep { color: #7eb8e8; }
    .scene-name.flow { color: #e8b84a; }
    .scene-name.unwind { color: #c9846e; }

    .player-container {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .progress-ring {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg);
    }

    .progress-ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 1;
    }

    .progress-ring-fill {
      fill: none;
      stroke-width: 1;
      stroke-linecap: round;
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      transition: stroke-dashoffset 0.1s linear, stroke 0.6s ease;
    }

    .play-button {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .play-button:hover {
      background: rgba(255,255,255,0.06);
      transform: scale(1.02);
    }

    .play-button:active {
      transform: scale(0.96);
    }

    .play-button.playing {
      transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
    }

    .play-button.loading {
      cursor: wait;
    }

    .play-button.loading .play-icon {
      opacity: 0.3;
      animation: pulse-loading 1s ease-in-out infinite;
    }

    @keyframes pulse-loading {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    .play-icon {
      width: 32px;
      height: 32px;
      fill: currentColor;
      opacity: 0.9;
      transition: all 0.3s ease;
    }

    .track-info {
      position: absolute;
      bottom: 8vh;
      text-align: center;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    .track-info.visible {
      opacity: 0.7;
    }

    .track-name {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .track-artist {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
    }

    .swipe-hint {
      position: absolute;
      bottom: 4vh;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .swipe-hint.visible {
      opacity: 1;
    }

    .volume-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .volume-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .volume-slider-vertical {
      width: 4px;
      height: 200px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }

    .volume-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 2px;
      transition: height 0.1s ease;
    }

    .volume-label {
      margin-top: 24px;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <!-- Background layers -->
  <div class="bg-layer bg-gradient" id="bgGradient"></div>
  <div class="bg-layer bg-noise"></div>
  <div class="bg-layer bg-aurora"></div>
  <div class="bg-layer bg-vignette"></div>

  <div class="app" id="app">
    <div class="scene-indicator" id="sceneIndicator">
      <div class="scene-label">Current State</div>
      <div class="scene-name" id="sceneName">Deep Work</div>
    </div>

    <div class="player-container">
      <svg class="progress-ring" viewBox="0 0 140 140">
        <circle class="progress-ring-bg" cx="70" cy="70" r="70"/>
        <circle class="progress-ring-fill" id="progressRing" cx="70" cy="70" r="70"/>
      </svg>
      
      <button class="play-button" id="playBtn">
        <svg class="play-icon" id="playIcon" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg class="play-icon" id="pauseIcon" viewBox="0 0 24 24" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
    </div>

    <div class="track-info" id="trackInfo">
      <div class="track-name" id="trackName">Morning Light</div>
      <div class="track-artist" id="trackArtist">Piano Ambient</div>
    </div>

    <div class="swipe-hint" id="swipeHint">Swipe to change</div>

    <div class="volume-overlay" id="volumeOverlay">
      <div class="volume-slider-vertical" id="volumeSlider">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
      <div class="volume-label">Volume</div>
    </div>
  </div>

  <script>
    const scenes = [
      {
        id: 'begin',
        name: 'Begin',
        startHour: 8,
        endHour: 10,
        tracks: [
          { title: 'Morning Start', artist: 'Harbor Zen', file: 'Harbor Zen - Piano 1.mp3' }
        ]
      },
      {
        id: 'deep',
        name: 'Deep Work',
        startHour: 10,
        endHour: 13,
        tracks: [
          { title: 'Deep Piano', artist: 'Harbor Zen', file: 'Harbor Zen - Piano 2.mp3' },
          { title: 'Focus Guitar', artist: 'Harbor Zen', file: 'Harbor Zen - Guitar 1.mp3' },
          { title: 'Flow Guitar', artist: 'Harbor Zen', file: 'Harbor Zen - Guitar 2.mp3' }
        ]
      },
      {
        id: 'flow',
        name: 'Flow',
        startHour: 13,
        endHour: 17,
        tracks: [
          { title: 'Afternoon Piano', artist: 'Harbor Zen', file: 'Harbor Zen - Piano 3.mp3' }
        ]
      },
      {
        id: 'unwind',
        name: 'Unwind',
        startHour: 17,
        endHour: 19,
        tracks: [
          { title: 'Evening Close', artist: 'Harbor Zen', file: 'Harbor Zen - Piano4.mp3' }
        ]
      }
    ];

    let currentSceneIndex = 0;
    let currentTrackIndex = 0;
    let isPlaying = false;
    let currentHowl = null;
    let smoothedIntensity = 0;
    let smoothedScale = 1;
    let animationId = null;

    // Dual audio source: Howler for playback, hidden audio + Web Audio API for analysis
    let analysisAudio = null;
    let audioContext = null;
    let analyser = null;
    let dataArray = null;
    let sourceNode = null;
    let isAudioContextInitialized = false;

    const sceneIndicator = document.getElementById('sceneIndicator');
    const sceneName = document.getElementById('sceneName');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const progressRing = document.getElementById('progressRing');
    const trackInfo = document.getElementById('trackInfo');
    const trackName = document.getElementById('trackName');
    const trackArtist = document.getElementById('trackArtist');
    const swipeHint = document.getElementById('swipeHint');
    const volumeOverlay = document.getElementById('volumeOverlay');
    const volumeFill = document.getElementById('volumeFill');
    const bgGradient = document.getElementById('bgGradient');

    let hideTimeout;
    let touchStartX = 0;
    let touchStartY = 0;
    let touchStartTime = 0;
    let longPressTimer;

    // Preload all audio using Howler
    const preloadedSounds = {};
    
    function preloadAllMusic() {
      const allFiles = [];
      scenes.forEach(scene => {
        scene.tracks.forEach(track => {
          if (!allFiles.includes(track.file)) {
            allFiles.push(track.file);
          }
        });
      });

      allFiles.forEach(file => {
        preloadedSounds[file] = new Howl({
          src: [`music/${file}`],
          html5: true, // Force HTML5 Audio for better streaming
          preload: true,
          volume: 0.8,
          onload: function() {
            console.log(`Loaded: ${file}`);
          },
          onloaderror: function(id, err) {
            console.error(`Failed to load ${file}:`, err);
          }
        });
      });
    }

    function getSceneByTime() {
      const hour = new Date().getHours();
      const index = scenes.findIndex(s => hour >= s.startHour && hour < s.endHour);
      return index !== -1 ? index : 3;
    }

    function loadScene(index) {
      currentSceneIndex = index;
      const scene = scenes[index];

      sceneName.textContent = scene.name;
      sceneName.className = 'scene-name ' + scene.id;
      playBtn.className = 'play-button ' + scene.id + (isPlaying ? ' playing' : '');
      progressRing.className = 'progress-ring-fill ' + scene.id;

      // Update background gradient based on scene
      if (bgGradient) {
        bgGradient.className = 'bg-layer bg-gradient ' + scene.id;
      }

      currentTrackIndex = 0;
      loadTrack();
    }

    function loadTrack() {
      const scene = scenes[currentSceneIndex];
      const track = scene.tracks[currentTrackIndex];
      
      trackName.textContent = track.title;
      trackArtist.textContent = track.artist;
      
      // Stop current playback
      if (currentHowl) {
        currentHowl.stop();
        currentHowl.unload();
      }
      
      // Stop and cleanup analysis audio
      if (analysisAudio) {
        analysisAudio.pause();
        analysisAudio.src = '';
        if (sourceNode) {
          sourceNode.disconnect();
          sourceNode = null;
        }
      }
      
      // Use preloaded Howl or create new one
      const file = track.file;
      if (preloadedSounds[file]) {
        currentHowl = preloadedSounds[file];
      } else {
        currentHowl = new Howl({
          src: [`music/${file}`],
          html5: true,
          volume: 0.8
        });
      }
      
      // Create hidden audio element for analysis
      analysisAudio = new Audio(`music/${file}`);
      analysisAudio.crossOrigin = 'anonymous';
      analysisAudio.preload = 'auto';
      analysisAudio.volume = 0; // Muted - we only use it for analysis
      
      // Set up event listeners
      currentHowl.on('end', onTrackEnd);
      currentHowl.on('load', () => {
        playBtn.classList.remove('loading');
      });
      currentHowl.on('loaderror', (id, err) => {
        console.error('Load error:', err);
        playBtn.classList.remove('loading');
      });
    }

    function initAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 1024; // Higher resolution for piano
        analyser.smoothingTimeConstant = 0.6; // Less smoothing = more responsive
        analyser.minDecibels = -120; // More sensitive to quiet sounds
        analyser.maxDecibels = -20; // Better range for piano dynamics
        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }
      
      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }
      
      // Connect analysis audio to analyser if not already connected
      if (analysisAudio && !sourceNode) {
        sourceNode = audioContext.createMediaElementSource(analysisAudio);
        sourceNode.connect(analyser);
        // Don't connect to destination - we don't want to hear this audio
        isAudioContextInitialized = true;
      }
    }

    function onTrackEnd() {
      currentTrackIndex = (currentTrackIndex + 1) % scenes[currentSceneIndex].tracks.length;
      loadTrack();
      if (isPlaying) {
        startPlayback();
      }
    }

    function togglePlay() {
      if (playBtn.classList.contains('loading')) return;
      
      isPlaying = !isPlaying;
      
      if (isPlaying) {
        startPlayback();
      } else {
        pausePlayback();
      }
      
      resetHideTimer();
    }

    function startPlayback() {
      playBtn.classList.add('loading');
      
      if (!currentHowl) {
        loadTrack();
      }
      
      // Initialize audio context for analysis
      initAudioContext();
      
      // Make sure analysis audio is loaded and ready
      if (analysisAudio && analysisAudio.readyState < 2) {
        analysisAudio.load();
      }
      
      // Check if already loaded
      if (currentHowl.state() === 'loaded') {
        playAudioAndStart();
      } else if (currentHowl.state() === 'loading') {
        // Wait for load
        currentHowl.once('load', () => {
          playAudioAndStart();
        });
      } else {
        // State is 'unloaded', need to load first
        currentHowl.load();
        currentHowl.once('load', () => {
          playAudioAndStart();
        });
      }
    }
    
    function playAudioAndStart() {
      currentHowl.play();
      // Start analysis audio in sync
      if (analysisAudio) {
        analysisAudio.currentTime = 0;
        analysisAudio.play().catch(e => console.log('Analysis audio play failed:', e));
      }
      onPlaybackStart();
    }

    function onPlaybackStart() {
      playBtn.classList.remove('loading');
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'block';
      playBtn.classList.add('playing');
      showTrackInfo();
      
      if (animationId) cancelAnimationFrame(animationId);
      visualize();
    }

    function pausePlayback() {
      if (currentHowl) {
        currentHowl.pause();
      }
      // Pause analysis audio too
      if (analysisAudio) {
        analysisAudio.pause();
      }
      playIcon.style.display = 'block';
      pauseIcon.style.display = 'none';
      playBtn.classList.remove('playing');
      if (animationId) cancelAnimationFrame(animationId);
      resetVisualEffects();
    }

    function resetVisualEffects() {
      playBtn.style.transform = '';
      playBtn.style.boxShadow = '';
      playBtn.style.borderColor = '';
      playBtn.style.opacity = '';
      progressRing.style.stroke = '';
      progressRing.style.filter = '';
      smoothedIntensity = 0;
      smoothedScale = 1;
    }

    function play() {
      isPlaying = true;
      startPlayback();
    }

    function nextScene() {
      loadScene((currentSceneIndex + 1) % scenes.length);
      play();
      showUI();
    }

    function prevScene() {
      loadScene((currentSceneIndex - 1 + scenes.length) % scenes.length);
      play();
      showUI();
    }

    function showTrackInfo() {
      trackInfo.classList.add('visible');
      resetHideTimer();
    }

    function showUI() {
      sceneIndicator.classList.remove('hidden');
      trackInfo.classList.add('visible');
      swipeHint.classList.add('visible');
      resetHideTimer();
    }

    function hideUI() {
      sceneIndicator.classList.add('hidden');
      trackInfo.classList.remove('visible');
      swipeHint.classList.remove('visible');
    }

    function resetHideTimer() {
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(hideUI, 4000);
    }

    function updateProgress() {
      if (!currentHowl || !isPlaying) return;
      const progress = currentHowl.seek() / currentHowl.duration();
      const circumference = 440;
      const offset = circumference - (progress * circumference);
      progressRing.style.strokeDashoffset = offset;
    }

    // Audio-driven visualization
    function visualize() {
      if (!isPlaying) return;
      
      // Update progress ring
      updateProgress();
      
      let audioIntensity = 0;
      
      // Get audio frequency data if available
      if (analyser && dataArray) {
        analyser.getByteFrequencyData(dataArray);
        
        // Calculate average intensity (0-255)
        let sum = 0;
        let bassSum = 0;
        let midSum = 0;
        
        for (let i = 0; i < dataArray.length; i++) {
          sum += dataArray[i];
          // Bass frequencies (first 10%)
          if (i < dataArray.length * 0.1) {
            bassSum += dataArray[i];
          }
          // Mid frequencies (10-60%)
          else if (i < dataArray.length * 0.6) {
            midSum += dataArray[i];
          }
        }
        
        const avgIntensity = sum / dataArray.length / 255;
        const bassIntensity = bassSum / (dataArray.length * 0.1) / 255;
        const midIntensity = midSum / (dataArray.length * 0.5) / 255;
        
        // Weight bass and mid more for piano music
        audioIntensity = avgIntensity * 0.3 + bassIntensity * 0.4 + midIntensity * 0.3;
        
        // Amplify low values for piano sensitivity - use steeper curve
        // When audioIntensity is low (piano), boost it significantly
        if (audioIntensity < 0.1) {
          audioIntensity = audioIntensity * 5; // Boost very low values
        } else {
          audioIntensity = Math.pow(audioIntensity, 0.5); // Less aggressive curve for higher values
        }
        
        // Clamp to valid range
        audioIntensity = Math.min(1, Math.max(0, audioIntensity));
      }
      
      // Smooth the intensity - faster response
      smoothedIntensity = smoothedIntensity + (audioIntensity - smoothedIntensity) * 0.2;
      
      // Calculate scale based on audio intensity
      const baseScale = 1;
      const maxScale = 1.12;
      const targetScale = baseScale + smoothedIntensity * (maxScale - baseScale);
      smoothedScale = smoothedScale + (targetScale - smoothedScale) * 0.15;
      
      // Get scene color
      const baseColor = {
        begin: [244, 197, 105],  // 朝阳金橙色
        deep: [126, 184, 232],   // 深海蓝
        flow: [232, 184, 74],    // 琥珀金
        unwind: [201, 132, 110]  // 日落红
      }[scenes[currentSceneIndex].id] || [168, 200, 236];
      
      // Dynamic opacity based on intensity
      const opacity = 0.75 + smoothedIntensity * 0.2;
      
      // Dynamic glow based on intensity - larger range for piano
      const glowSize = 30 + smoothedIntensity * 100; // 30 to 130px
      const glowAlpha = 0.4 + smoothedIntensity * 0.5; // More visible base glow
      const glowColor = `rgba(${baseColor.join(',')}, ${glowAlpha})`;
      
      playBtn.style.transform = `scale(${smoothedScale})`;
      playBtn.style.boxShadow = `0 0 ${glowSize}px ${smoothedIntensity * 15}px ${glowColor}`;
      playBtn.style.borderColor = `rgba(${baseColor.join(',')}, ${0.4 + smoothedIntensity * 0.4})`;
      playBtn.style.opacity = opacity;
      progressRing.style.stroke = `rgb(${baseColor.join(',')})`;
      
      animationId = requestAnimationFrame(visualize);
    }

    // Event Listeners
    playBtn.addEventListener('click', togglePlay);

    // Touch events
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchStartTime = Date.now();
      
      longPressTimer = setTimeout(() => {
        volumeOverlay.classList.add('active');
      }, 600);
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      clearTimeout(longPressTimer);
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      clearTimeout(longPressTimer);
      
      if (volumeOverlay.classList.contains('active')) {
        setTimeout(() => volumeOverlay.classList.remove('active'), 1500);
        return;
      }

      const touchEndX = e.changedTouches[0].clientX;
      const diffX = touchStartX - touchEndX;
      const duration = Date.now() - touchStartTime;

      if (Math.abs(diffX) > 50) {
        if (diffX > 0) {
          nextScene();
        } else {
          prevScene();
        }
      } else if (Math.abs(diffX) < 30) {
        // Any tap/click (not swipe) shows UI, regardless of duration
        showUI();
      }
    }, { passive: true });

    // Volume control
    function setVolumeFromTouch(clientY) {
      const rect = document.getElementById('volumeSlider').getBoundingClientRect();
      const percent = 1 - ((clientY - rect.top) / rect.height);
      const volume = Math.max(0, Math.min(1, percent));
      if (currentHowl) {
        currentHowl.volume(volume);
      }
      volumeFill.style.height = (volume * 100) + '%';
    }

    volumeOverlay.addEventListener('touchstart', (e) => {
      setVolumeFromTouch(e.touches[0].clientY);
    }, { passive: true });

    volumeOverlay.addEventListener('touchmove', (e) => {
      setVolumeFromTouch(e.touches[0].clientY);
    }, { passive: true });

    // Mouse click to show UI (exclude play button)
    document.addEventListener('click', (e) => {
      if (e.target !== playBtn && !playBtn.contains(e.target)) {
        showUI();
      }
    });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      } else if (e.code === 'ArrowRight') {
        nextScene();
      } else if (e.code === 'ArrowLeft') {
        prevScene();
      }
    });

    // Initialize
    preloadAllMusic();
    loadScene(getSceneByTime());
    resetHideTimer();
  </script>
</body>
</html>
